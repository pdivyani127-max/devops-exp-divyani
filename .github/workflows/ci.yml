name: Python CI - Divyani

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install pytest bandit

    - name: Run Tests
      run: |
        python -m unittest discover

    - name: Run Security Scan
      run: |
        bandit -r .